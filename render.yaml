services:
  - type: web
    name: task-manager
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///prod_tasks.db
      - key: PYTHON_VERSION
        value: 3.11.0
