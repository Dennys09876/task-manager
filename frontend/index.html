<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Gestión de Tareas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </div>
      <span class="logo-text">TaskFlow</span>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-label">WORKSPACE</span>
      <a href="#" class="nav-item active">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Tablero
      </a>
      <a href="#" class="nav-item">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Mis tareas
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="env-pill" id="env-pill">DEV</div>
      <span class="env-text">Ambiente activo</span>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-wrapper">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">Tablero de Tareas</h1>
        <span class="page-sub">Gestiona el progreso de tu equipo</span>
      </div>
      <div class="topbar-right">
        <div class="filter-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          <select id="filter-status" class="filter-select">
            <option value="">Todas las tareas</option>
            <option value="pending">Pendientes</option>
            <option value="in_progress">En Progreso</option>
            <option value="completed">Completadas</option>
          </select>
        </div>
        <button class="btn-new" id="open-modal-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nueva Tarea
        </button>
      </div>
    </header>

    <!-- STATS -->
    <section class="stats-row" id="stats"></section>

    <!-- KANBAN COLUMNS -->
    <section class="kanban" id="kanban">
      <div class="kanban-col" id="col-pending">
        <div class="col-header">
          <span class="col-dot dot-pending"></span>
          <span class="col-title">Pendiente</span>
          <span class="col-count" id="count-pending">0</span>
        </div>
        <div class="col-cards" id="cards-pending"></div>
      </div>

      <div class="kanban-col" id="col-in_progress">
        <div class="col-header">
          <span class="col-dot dot-in_progress"></span>
          <span class="col-title">En Progreso</span>
          <span class="col-count" id="count-in_progress">0</span>
        </div>
        <div class="col-cards" id="cards-in_progress"></div>
      </div>

      <div class="kanban-col" id="col-completed">
        <div class="col-header">
          <span class="col-dot dot-completed"></span>
          <span class="col-title">Completado</span>
          <span class="col-count" id="count-completed">0</span>
        </div>
        <div class="col-cards" id="cards-completed"></div>
      </div>
    </section>

    <p id="empty-msg" class="empty-msg hidden">No hay tareas que mostrar.</p>
  </div>

  <!-- MODAL -->
  <div class="modal-backdrop hidden" id="modal-backdrop">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Nueva Tarea</h2>
        <button class="modal-close" id="modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="task-form">
        <input type="hidden" id="task-id" />
        <div class="field">
          <label for="title">Título <span class="required">*</span></label>
          <input type="text" id="title" maxlength="200" placeholder="¿Qué hay que hacer?" autocomplete="off" required />
        </div>
        <div class="field">
          <label for="description">Descripción</label>
          <textarea id="description" rows="3" placeholder="Agrega más contexto (opcional)"></textarea>
        </div>
        <div class="field">
          <label for="status">Estado</label>
          <div class="select-wrap">
            <select id="status">
              <option value="pending">Pendiente</option>
              <option value="in_progress">En Progreso</option>
              <option value="completed">Completado</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="cancel-btn">Cancelar</button>
          <button type="submit" class="btn-save" id="submit-btn">Crear Tarea</button>
        </div>
      </form>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
